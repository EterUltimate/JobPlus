server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            exposedHeaders:
              - X-User-Id
              - X-User-Role
  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: jobplus-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
  expiration-ms: 86400000

logging:
  level:
    com.jobplus.gateway: DEBUG

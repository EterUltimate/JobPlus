server:
  port: 8083

spring:
  application:
    name: job-service
  datasource:
    url: jdbc:postgresql://localhost:5432/jobplus
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 6379
  # Kafka configuration (optional - comment out if Kafka is not installed)
  # kafka:
  #   bootstrap-servers: localhost:9092
  #   producer:
  #     acks: all
  #     retries: 3
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

logging:
  level:
    com.jobplus: DEBUG

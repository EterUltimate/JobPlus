server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: ${JOBPLUS_DB_URL:jdbc:postgresql://localhost:5432/jobplus}
    username: ${JOBPLUS_DB_USERNAME:postgres}
    password: Luo@760818
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
      config:
        enabled: false
        server-addr: localhost:8848

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

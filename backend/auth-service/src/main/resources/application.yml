  global-config:
    db-config:
      id-type: auto

jwt:
  secret: jobplus-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
  expiration-ms: 86400000

logging:
  level:
    com.jobplus: DEBUG

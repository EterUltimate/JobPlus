server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://localhost:5432/jobplus
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 6379

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: jobplus-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
  expiration-ms: 86400000

# Nacos（可选，若有 Nacos 则取消注释）
# spring.cloud.nacos.discovery.server-addr: localhost:8848
# spring.cloud.nacos.config.server-addr: localhost:8848

logging:
  level:
    com.jobplus: DEBUG
